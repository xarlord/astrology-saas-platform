version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: \${DATABASE_NAME:-astrology_saas}
      POSTGRES_USER: \${DATABASE_USER:-astrology}
      POSTGRES_PASSWORD: \${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \${DATABASE_USER:-astrology}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: \${DATABASE_NAME:-astrology_saas}
      DATABASE_USER: \${DATABASE_USER:-astrology}
      DATABASE_PASSWORD: \${DATABASE_PASSWORD}
      DATABASE_URL: postgresql://\${DATABASE_USER:-astrology}:\${DATABASE_PASSWORD}@db:5432/\${DATABASE_NAME:-astrology_saas}
      JWT_SECRET: \${JWT_SECRET}
      JWT_EXPIRES_IN: \${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: \${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: \${FRONTEND_URL:-https://astroverse.app}
      API_URL: \${API_URL:-https://api.astroverse.app}
      STRIPE_SECRET_KEY: \${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: \${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: \${STRIPE_PRICE_ID:-}
      OPENAI_API_KEY: \${OPENAI_API_KEY:-}
      SENTRY_DSN: \${SENTRY_DSN:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (served by Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - \${SSL_CERT_PATH:-/etc/ssl/certs}:/etc/ssl/certs:ro
      - \${SSL_KEY_PATH:-/etc/ssl/private}:/etc/ssl/private:ro

volumes:
  postgres_data:
    driver: local
