# ============================================================================
# Docker Compose — Staging Environment
# AstroVerse Astrology SaaS Platform
# ============================================================================
#
# Starts the full stack locally for QA validation:
#   PostgreSQL 15, Redis 7, Backend (Express), Frontend (Nginx)
#
# USAGE:
#   1. Copy .env.staging.example to .env.staging and fill in secrets:
#        cp .env.staging.example .env.staging
#   2. Start the stack:
#        docker compose -f docker-compose.staging.yml up --build
#   3. Access:
#        Frontend:  http://localhost:80
#        Backend:   http://localhost:80/api  (proxied via nginx)
#        Backend direct: http://localhost:3001
#        Health:    http://localhost:80/health
#   4. Stop:
#        docker compose -f docker-compose.staging.yml down
#
# NOTES:
#   - Backend runs migrations + seeds automatically on startup
#   - Nginx proxies /api/* to the backend container (no CORS issues)
#   - Redis is included for future session/cache use
#   - Data persists in named Docker volumes between restarts
#
# ============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: astrology-staging-db
    environment:
      POSTGRES_DB: astrology_staging
      POSTGRES_USER: staging_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging_password_change_me}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staging_user -d astrology_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - staging-network

  # ---------------------------------------------------------------------------
  # Redis 7 — Session storage / cache (infrastructure readiness)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: astrology-staging-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging-network

  # ---------------------------------------------------------------------------
  # Backend API — Express + TypeScript
  #   - Builds from backend/Dockerfile.production (multi-stage)
  #   - Runs migrations + seeds on startup, then serves the API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: astrology-staging-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      PORT: 3001
      # Database — individual vars to avoid forced SSL in knexfile
      # (local Docker postgres does not support SSL)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: astrology_staging
      DATABASE_USER: staging_user
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-staging_password_change_me}
      DATABASE_SSL: "false"
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      # Redis
      REDIS_URL: redis://redis:6379
      # Auth
      JWT_SECRET: ${JWT_SECRET:-staging-jwt-secret-minimum-32-characters-long-for-security}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      # CORS — allow nginx proxy and direct access
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3001}
      FRONTEND_URL: http://localhost
      # Swiss Ephemeris
      EPHEMERIS_PATH: ./ephemeris
      # Logging
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    # Run migrations + seeds, then start the server
    command: >-
      sh -c "npx tsx scripts/migrate.ts && npx knex seed:run --knexfile knexfile.ts --env staging && node dist/server.js"
    networks:
      - staging-network

  # ---------------------------------------------------------------------------
  # Frontend — Nginx serving React SPA with API proxy
  #   - Builds from frontend/Dockerfile.production
  #   - Uses staging nginx config that proxies /api/* to backend
  #   - Single port (80) for both frontend and API
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        # Build-time API URL — empty because nginx proxies /api to backend
        VITE_API_URL: ""
    container_name: astrology-staging-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped
    # Override the default nginx.conf with staging config (API proxy)
    volumes:
      - ./nginx/staging.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - staging-network

# =============================================================================
# Volumes — Persist data between container restarts
# =============================================================================
volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local

# =============================================================================
# Network — All services on the same bridge network
# =============================================================================
networks:
  staging-network:
    driver: bridge
