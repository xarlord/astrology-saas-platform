<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AstroVerse Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b3de1",
                        "secondary": "#a855f7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0B0D17",
                        "lavender": "#d8b4fe",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "2xl": "1.5rem", "full": "9999px"},
                    backgroundImage: {
                        'cosmic-gradient': 'radial-gradient(circle at 50% 0%, rgba(107, 61, 225, 0.25) 0%, rgba(11, 13, 23, 0) 50%)',
                        'nebula-dust': 'radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, rgba(11, 13, 23, 0) 40%)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles for elements not covered by Tailwind config */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #6b3de1;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #6b3de1;
        }
        
        /* Cosmic star animation */
        @keyframes twinkle {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
        }
        .animate-twinkle {
            animation: twinkle 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Cosmic Background Elements -->
<div class="absolute inset-0 z-0 bg-cosmic-gradient pointer-events-none"></div>
<div class="absolute inset-0 z-0 bg-nebula-dust pointer-events-none"></div>
<!-- Stars (Simulated with absolute divs) -->
<div class="absolute top-10 left-10 size-1 bg-white rounded-full opacity-60 animate-twinkle" style="animation-delay: 0s;"></div>
<div class="absolute top-20 right-12 size-0.5 bg-lavender rounded-full opacity-40 animate-twinkle" style="animation-delay: 1s;"></div>
<div class="absolute bottom-32 left-8 size-0.5 bg-white rounded-full opacity-50 animate-twinkle" style="animation-delay: 2s;"></div>
<!-- Main Container -->
<div class="relative z-10 w-full max-w-[390px] h-full flex flex-col px-6 py-8 mx-auto">
<!-- Header / Logo -->
<div class="flex flex-col items-center justify-center pt-8 pb-6">
<div class="relative text-primary dark:text-primary mb-3">
<div class="absolute inset-0 bg-primary/40 blur-xl rounded-full scale-150"></div>
<span class="material-symbols-outlined relative z-10 text-5xl animate-twinkle" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                    auto_awesome
                </span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-wide uppercase">AstroVerse</h2>
</div>
<!-- Typography -->
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-white text-[32px] font-bold leading-tight mb-2 tracking-tight">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-light">Sign in to access your cosmic insights</p>
</div>
<!-- Form -->
<form class="space-y-5 w-full">
<!-- Email Input -->
<div class="group relative">
<div class="flex items-center w-full rounded-2xl border border-primary/30 bg-white/5 dark:bg-white/5 backdrop-blur-md focus-within:border-primary focus-within:ring-1 focus-within:ring-primary/50 transition-all duration-300 overflow-hidden">
<div class="pl-4 pr-2 text-slate-400 dark:text-slate-400 flex items-center justify-center">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="w-full bg-transparent border-none text-slate-900 dark:text-white placeholder:text-slate-500 dark:placeholder:text-slate-500 h-14 focus:ring-0 text-base font-normal" placeholder="Email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="group relative">
<div class="flex items-center w-full rounded-2xl border border-primary/30 bg-white/5 dark:bg-white/5 backdrop-blur-md focus-within:border-primary focus-within:ring-1 focus-within:ring-primary/50 transition-all duration-300 overflow-hidden">
<div class="pl-4 pr-2 text-slate-400 dark:text-slate-400 flex items-center justify-center">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-transparent border-none text-slate-900 dark:text-white placeholder:text-slate-500 dark:placeholder:text-slate-500 h-14 focus:ring-0 text-base font-normal" placeholder="Password" type="password"/>
<button class="pr-4 pl-2 text-slate-500 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors flex items-center" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Interactions Row -->
<div class="flex items-center justify-between pt-1">
<label class="inline-flex items-center cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-6 bg-slate-200 peer-focus:outline-none dark:bg-slate-700 rounded-full peer dark:bg-white/10 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
<span class="ms-3 text-sm font-medium text-slate-600 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-lavender transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-primary dark:text-lavender hover:text-secondary hover:underline transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-14 mt-4 rounded-full bg-gradient-to-r from-primary to-[#4c24b3] hover:to-primary text-white text-lg font-bold tracking-wide shadow-[0_0_20px_rgba(107,61,225,0.4)] hover:shadow-[0_0_30px_rgba(107,61,225,0.6)] transition-all duration-300 transform active:scale-[0.98]" type="submit">
                Sign In
            </button>
</form>
<!-- Social Login -->
<div class="flex flex-col items-center mt-8 w-full">
<div class="flex items-center w-full mb-6">
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
<span class="px-4 text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest">or continue with</span>
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
</div>
<div class="flex items-center justify-center gap-6">
<!-- Google Button -->
<button class="size-14 rounded-full bg-white/5 hover:bg-white/10 dark:bg-white/5 dark:hover:bg-white/10 backdrop-blur-md border border-slate-200 dark:border-white/10 flex items-center justify-center transition-all duration-300 group">
<svg class="w-6 h-6 group-hover:scale-110 transition-transform duration-300" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M23.766 12.2764C23.766 11.4607 23.6999 10.6406 23.5588 9.83807H12.24V14.4591H18.7217C18.4528 15.9494 17.5885 17.2678 16.323 18.1056V21.1039H20.19C22.4608 19.0139 23.766 15.9274 23.766 12.2764Z" fill="#4285F4"></path>
<path d="M12.2401 24.0008C15.4766 24.0008 18.2059 22.9382 20.1945 21.1039L16.3275 18.1055C15.2517 18.8375 13.8627 19.252 12.2445 19.252C9.11388 19.252 6.45946 17.1399 5.50705 14.3003H1.5166V17.3912C3.55371 21.4434 7.7029 24.0008 12.2401 24.0008Z" fill="#34A853"></path>
<path d="M5.50253 14.3003C5.00236 12.8099 5.00236 11.1961 5.50253 9.70575V6.61481H1.51649C-0.18551 10.0056 -0.18551 14.0004 1.51649 17.3912L5.50253 14.3003Z" fill="#FBBC05"></path>
<path d="M12.2401 4.74966C13.9509 4.7232 15.6044 5.36697 16.8434 6.54867L20.2695 3.12262C18.1001 1.0855 15.2208 -0.034466 12.2401 0.000808666C7.7029 0.000808666 3.55371 2.55822 1.5166 6.61481L5.50264 9.70575C6.45064 6.86173 9.10947 4.74966 12.2401 4.74966Z" fill="#EA4335"></path>
</svg>
</button>
<!-- Apple Button -->
<button class="size-14 rounded-full bg-white/5 hover:bg-white/10 dark:bg-white/5 dark:hover:bg-white/10 backdrop-blur-md border border-slate-200 dark:border-white/10 flex items-center justify-center transition-all duration-300 group">
<svg class="w-6 h-6 text-slate-900 dark:text-white group-hover:scale-110 transition-transform duration-300" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16.6385 15.9392C15.8202 17.1065 14.9391 18.2575 13.5936 18.2575C12.296 18.2575 11.8906 17.4721 10.3756 17.4721C8.83446 17.4721 8.35623 18.2289 7.19438 18.2861C5.92298 18.3421 4.76435 17.2001 3.96884 16.0506C2.3331 13.6823 1.10931 9.35639 2.76865 6.4719C3.59164 5.04505 5.05928 4.14207 6.62772 4.08488C8.10052 4.02769 9.12009 4.96642 10.0246 4.96642C10.9021 4.96642 12.2031 3.86895 13.9189 4.02769C14.6402 4.05629 16.6358 4.31215 17.9333 6.21601C17.8306 6.27891 15.6888 7.53119 15.7173 10.0986C15.7459 12.7574 17.962 13.8411 18.0677 13.8982C17.4957 15.5675 16.9205 17.0622 16.0354 18.3705L16.6385 15.9392ZM12.0199 4.06767C12.6933 3.23565 13.1506 2.07925 13.0163 0.938507C12.0199 0.981392 10.8164 1.60897 10.0917 2.45388C9.44421 3.19705 8.87522 4.36499 9.03429 5.48008C10.1446 5.56871 11.2995 4.93925 12.0199 4.06767Z"></path>
</svg>
</button>
</div>
</div>
<!-- Footer -->
<div class="mt-auto pt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="font-bold text-primary dark:text-white hover:text-secondary dark:hover:text-lavender transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
</body></html>
