<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AstroVerse Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b3de1",
                        "primary-hover": "#5a32c0",
                        "cosmic-blue": "#2563EB",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0B0D17", // Deep Navy requested
                        "surface-dark": "#151725",
                        "lavender": "#A78BFA",
                        "gold": "#F5A623",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    backgroundImage: {
                        'cosmic-gradient': 'linear-gradient(135deg, #6b3de1 0%, #2563EB 100%)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0D17;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f2645;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b3de1;
        }
        
        .glass-panel {
            background: rgba(22, 18, 33, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Subtle floating animation for background elements */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased selection:bg-primary selection:text-white overflow-hidden">
<div class="flex min-h-screen w-full flex-row">
<!-- Left Panel: Cosmic Artwork -->
<div class="hidden lg:flex lg:w-5/12 xl:w-1/2 relative flex-col justify-between overflow-hidden bg-[#05060e]">
<!-- Background Image -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-80" data-alt="Deep space nebula with purple and blue starry galaxy clouds" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAFUYNfRXz-Nk3HeobGsgSRlxfbh85-ieQ8R_5HJFse7CNKqILYpFD5Z637egp63hqZpXmoR24kViIHTDMv8Sy_w4pGc9vqLBDUg_UMCcTdid09PKWw21JRvceFTQ3OQW48BU6xFrlDv6BgcFcnlBSA2tVqwx-wvSxqs7eCXKPgWT2RJY19tTHRdM7lHh6DCfUsDMIT48SeVBkf0f4YaZxvzSSn-gdkoziUORrJUPFYLUZ8nJQdo3i7zwdRT45Xv4NXVfpO8d810jFd');">
</div>
<!-- Overlay Gradient -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-[#0B0D17] via-[#0B0D17]/40 to-transparent"></div>
<!-- Content -->
<div class="relative z-20 flex h-full flex-col justify-between p-12 xl:p-16">
<!-- Logo Area -->
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-white/10 backdrop-blur-sm border border-white/10">
<span class="material-symbols-outlined text-gold" style="font-size: 24px;">auto_awesome</span>
</div>
<span class="text-2xl font-bold tracking-tight text-white">AstroVerse</span>
</div>
<!-- Central Visual Element (Abstract Zodiac Wheel) -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-30 pointer-events-none animate-float">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="200" cy="200" r="198" stroke="url(#paint0_linear)" stroke-dasharray="8 8" stroke-width="1"></circle>
<circle cx="200" cy="200" r="150" stroke="url(#paint0_linear)" stroke-width="1"></circle>
<circle cx="200" cy="200" r="100" stroke="url(#paint0_linear)" stroke-dasharray="4 4" stroke-width="0.5"></circle>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear" x1="200" x2="200" y1="0" y2="400">
<stop stop-color="#A78BFA" stop-opacity="0.8"></stop>
<stop offset="1" stop-color="#2563EB" stop-opacity="0.1"></stop>
</lineargradient>
</defs>
</svg>
</div>
<!-- Bottom Quote -->
<div class="max-w-md">
<div class="mb-4 inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-medium text-lavender backdrop-blur-md">
<span class="material-symbols-outlined text-[14px]">spark</span>
<span>Daily Insight</span>
</div>
<blockquote class="text-3xl font-medium leading-tight text-white lg:text-4xl">
                        "The stars are aligned for your journey."
                    </blockquote>
<div class="mt-6 flex items-center gap-3">
<div class="h-px w-12 bg-gradient-to-r from-gold to-transparent"></div>
<p class="text-sm font-light text-slate-400">Premium Astrology SaaS</p>
</div>
</div>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="flex w-full flex-1 flex-col justify-center bg-background-dark px-4 py-12 sm:px-6 lg:px-20 xl:px-24">
<div class="mx-auto w-full max-w-[420px]">
<!-- Mobile Logo (visible only on small screens) -->
<div class="mb-8 flex items-center gap-2 lg:hidden">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/20 text-primary">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<span class="text-2xl font-bold text-white">AstroVerse</span>
</div>
<!-- Header -->
<div class="mb-10 text-center lg:text-left">
<h1 class="mb-2 text-4xl font-bold tracking-tight text-white">Welcome Back</h1>
<p class="text-lavender/80">Sign in to access your cosmic insights</p>
</div>
<!-- Form Container -->
<div class="glass-panel rounded-2xl p-8 shadow-2xl shadow-primary/5">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="mb-2 block text-sm font-medium text-slate-200" for="email">Email</label>
<div class="relative rounded-xl shadow-sm">
<div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-lavender/60">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="block w-full rounded-xl border-0 bg-surface-dark py-3.5 pl-11 pr-4 text-white ring-1 ring-inset ring-white/10 placeholder:text-slate-500 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6 transition-all duration-200" id="email" name="email" placeholder="cosmic.traveler@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="mb-2 block text-sm font-medium text-slate-200" for="password">Password</label>
<div class="relative rounded-xl shadow-sm">
<div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-lavender/60">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full rounded-xl border-0 bg-surface-dark py-3.5 pl-11 pr-4 text-white ring-1 ring-inset ring-white/10 placeholder:text-slate-500 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6 transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-white/20 bg-surface-dark text-primary focus:ring-primary focus:ring-offset-background-dark" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-300" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-medium text-lavender hover:text-white transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="group relative flex w-full justify-center rounded-xl bg-cosmic-gradient py-3.5 px-3 text-sm font-semibold text-white shadow-lg shadow-primary/25 transition-all duration-200 hover:shadow-primary/40 hover:-translate-y-0.5 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary" type="submit">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
</span>
                                Sign In
                                <span class="material-symbols-outlined ml-2 text-lg transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="relative mt-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-background-dark px-3 text-xs font-medium uppercase tracking-wider text-slate-500 rounded-full">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="mt-8 grid grid-cols-2 gap-4">
<a class="flex w-full items-center justify-center gap-3 rounded-xl bg-white/5 px-3 py-3 text-sm font-medium text-white ring-1 ring-inset ring-white/10 hover:bg-white/10 transition-colors" href="#">
<svg aria-hidden="true" class="h-5 w-5" viewbox="0 0 24 24">
<path d="M12.0003 20.45c4.6593 0 8.3604-3.8532 8.1897-8.5082h-8.1897v-3.3444h11.9793c.1251.681.1897 1.3857.1897 2.1154 0 6.627-5.373 12-12 12-6.627 0-12-5.373-12-12s5.373-12 12-12c3.056 0 5.845 1.137 7.973 3.013l-2.585 2.528c-1.397-1.127-3.172-1.805-5.388-1.805-4.615 0-8.356 3.741-8.356 8.356s3.741 8.356 8.356 8.356z" fill="currentColor"></path>
</svg>
<span class="text-sm font-semibold leading-6">Google</span>
</a>
<a class="flex w-full items-center justify-center gap-3 rounded-xl bg-white/5 px-3 py-3 text-sm font-medium text-white ring-1 ring-inset ring-white/10 hover:bg-white/10 transition-colors" href="#">
<svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M13.135 6.05675C13.6215 5.5675 13.922 4.96675 13.922 4.416C13.922 4.281 13.9102 4.1445 13.8765 4.0095C13.2592 4.03275 12.5167 4.39425 12.0622 4.88775C11.649 5.334 11.2935 5.96925 11.2935 6.5415C11.2935 6.69 11.3115 6.8265 11.3325 6.94275C11.9962 6.98925 12.6735 6.61125 13.135 6.05675ZM15.9382 13.881C15.918 15.3562 17.2065 16.1482 17.2725 16.1857C17.229 16.3267 17.025 17.0197 16.533 17.7052C16.11 18.2932 15.666 18.8752 14.976 18.8932C14.286 18.9112 14.07 18.4972 13.248 18.4972C12.426 18.4972 12.18 18.8932 11.532 18.9112C10.878 18.9292 10.374 18.2752 9.9405 17.6872C9.0525 16.4812 8.3745 14.2822 8.3745 12.5122C8.3745 10.9762 9.2025 10.0342 10.74 10.0162C11.406 10.0072 12.042 10.4392 12.45 10.4392C12.852 10.4392 13.632 9.92925 14.814 9.91125C15.312 9.92925 16.596 10.0912 17.316 11.0812C17.256 11.1172 15.9562 11.8372 15.9382 13.881Z"></path>
</svg>
<span class="text-sm font-semibold leading-6">Apple</span>
</a>
</div>
</div>
<!-- Footer -->
<p class="mt-10 text-center text-sm text-slate-400">
                    Don't have an account?
                    <a class="font-semibold leading-6 text-primary hover:text-lavender transition-colors" href="#">Sign up for free</a>
</p>
</div>
</div>
</div>
</body></html>
