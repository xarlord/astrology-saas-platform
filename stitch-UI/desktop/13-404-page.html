<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AstroVerse - 404 Lost in the Cosmos</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b3de1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161220",
                        "deep-space": "#0B0D17",
                        "cosmic-blue": "#2563EB",
                        "soft-lavender": "#A78BFA",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                    backgroundImage: {
                        'nebula-gradient': 'radial-gradient(circle at 50% 50%, rgba(107, 61, 225, 0.15) 0%, rgba(11, 13, 23, 0) 70%)',
                        'star-pattern': 'radial-gradient(white 1px, transparent 1px)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom animations for the cosmic feel */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -10px); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-drift {
            animation: drift 10s ease-in-out infinite;
        }
        .animate-pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        .glass-panel {
            background: rgba(22, 18, 32, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-deep-space font-display text-slate-100 min-h-screen relative overflow-hidden flex flex-col">
<!-- Background Elements -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<!-- Nebula Gradients -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-cosmic-blue/10 blur-[120px] rounded-full"></div>
<div class="absolute top-[40%] left-[50%] transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 blur-[100px] rounded-full"></div>
<!-- Stars (CSS generated for performance) -->
<div class="absolute top-[15%] left-[10%] w-1 h-1 bg-white rounded-full opacity-60 animate-pulse" style="--duration: 3s; --delay: 0s;"></div>
<div class="absolute top-[25%] left-[80%] w-0.5 h-0.5 bg-white rounded-full opacity-40 animate-pulse" style="--duration: 4s; --delay: 1s;"></div>
<div class="absolute top-[75%] left-[15%] w-1 h-1 bg-soft-lavender rounded-full opacity-50 animate-pulse" style="--duration: 5s; --delay: 2s;"></div>
<div class="absolute top-[60%] left-[90%] w-0.5 h-0.5 bg-white rounded-full opacity-70 animate-pulse" style="--duration: 2s; --delay: 0.5s;"></div>
<div class="absolute top-[10%] left-[50%] w-0.5 h-0.5 bg-white rounded-full opacity-30 animate-pulse" style="--duration: 6s; --delay: 3s;"></div>
</div>
<!-- Main Content Container -->
<main class="flex-grow flex items-center justify-center relative z-10 px-4 py-12">
<div class="max-w-[1200px] w-full flex flex-col md:flex-row items-center justify-center gap-12 md:gap-20">
<!-- Illustration Area -->
<div class="relative w-full max-w-[480px] aspect-square flex items-center justify-center order-2 md:order-1">
<!-- Zodiac Ring Background -->
<div class="absolute inset-0 bg-contain bg-center bg-no-repeat opacity-40 animate-drift" data-alt="Abstract deep space texture representing a broken zodiac wheel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBcQ5HiHT4Kj_hVmlM-tDWAllVBRF6YrZNrjGFnaVdRXcEIfZ8JpGBxZyT7khNYmuIrLVMp3Q9VQ-QEhoeGvORXzrqmxxKxoBCXuwtKYoT0LrNDHQq5LP8V5gcPL47qJGWFPWGe5xQkhgJsCRY3Ki91VqiDZPkk-eWajvSK-5-b9ZronBRgXUnI0_ChOkHB8wcgUl2GxVsfkNRO2U-KHRicVUN50FioMaGP9527IB69BWsVIgPVIYFPHN5rxA_VK6_iEJ-z81gKcHSw');">
<div class="absolute inset-0 bg-deep-space/60 mix-blend-multiply"></div>
</div>
<!-- Broken Wheel SVG Representation -->
<svg class="absolute w-[110%] h-[110%] text-primary/30 animate-[spin_60s_linear_infinite]" fill="none" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<circle cx="50" cy="50" r="48" stroke="currentColor" stroke-dasharray="4 4" stroke-width="0.5"></circle>
<circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="0.2"></circle>
</svg>
<!-- Floating Astronaut Image -->
<div class="relative w-[80%] h-[80%] animate-float z-20">
<img alt="Astronaut floating in deep space darkness" class="w-full h-full object-contain drop-shadow-[0_0_30px_rgba(107,61,225,0.4)] mask-image-gradient" data-alt="Astronaut floating in deep space darkness" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDp6S0OQNmT7zYyWZLm488Wxx5xjmWtTy7YvAJywkGVL0zghe12sFviXIBN7kFtoMMQS7ezSKmhIV1a2UhpraarpKCTM6gWRKTpyN32OwgfS7AZPT_ImEY-QB0qUGICUIDn-foC1deSgoW5td8xm4Hcfz1TL-fmJhDpJ-IWRygwHlwTlQEZ-oNXBjmprx82lk_k0rsEhlA_49e09iEn-PYm1qRA-pWMpMU10iXrqY6yMQ-fAfqHWy8vwDxGAvkM-JBhkv0fmjr56tJr" style="-webkit-mask-image: radial-gradient(circle at center, black 60%, transparent 100%); mask-image: radial-gradient(circle at center, black 60%, transparent 100%);"/>
</div>
<!-- Floating debris particles -->
<div class="absolute top-10 right-10 w-3 h-3 bg-soft-lavender/40 rotate-45 animate-drift" style="animation-duration: 15s;"></div>
<div class="absolute bottom-20 left-10 w-2 h-2 bg-cosmic-blue/40 rounded-full animate-drift" style="animation-duration: 20s; animation-direction: reverse;"></div>
</div>
<!-- Text Content Area -->
<div class="flex flex-col items-center md:items-start text-center md:text-left order-1 md:order-2 max-w-lg z-30">
<h1 class="text-[120px] md:text-[160px] font-bold leading-none tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white via-primary/50 to-transparent drop-shadow-[0_0_25px_rgba(107,61,225,0.5)] select-none">
                    404
                </h1>
<h2 class="text-3xl md:text-4xl font-bold text-white mb-4 tracking-tight animate-pulse-glow">
                    Lost in the Cosmos
                </h2>
<p class="text-lg text-slate-300 mb-8 leading-relaxed font-light max-w-md">
                    The stars couldn't find the page you're looking for. Perhaps Mercury is in retrograde?
                </p>
<div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
<button class="group relative px-8 py-3.5 bg-gradient-to-r from-[#6c3de1] to-[#512da8] rounded-xl text-white font-bold tracking-wide transition-all duration-300 hover:shadow-[0_0_20px_rgba(107,61,225,0.6)] hover:-translate-y-0.5 overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 skew-y-12"></div>
<span class="relative flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">rocket_launch</span>
                            Return Home
                        </span>
</button>
<button class="px-8 py-3.5 rounded-xl text-white font-medium tracking-wide border border-white/10 bg-white/5 backdrop-blur-sm transition-all duration-300 hover:bg-white/10 hover:border-white/20 hover:-translate-y-0.5 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">dashboard</span>
                        Go to Dashboard
                    </button>
</div>
</div>
</div>
</main>
<!-- Footer Status Bar -->
<footer class="w-full relative z-20 py-6 px-6">
<div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-center sm:justify-between gap-4 opacity-70 hover:opacity-100 transition-opacity duration-300">
<!-- Brand Mark -->
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-deep-space flex items-center justify-center shadow-lg border border-white/10">
<span class="material-symbols-outlined text-white text-[18px]">auto_awesome</span>
</div>
<span class="text-sm font-semibold tracking-wider text-slate-300 uppercase">AstroVerse</span>
</div>
<!-- Humorous Status -->
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></span>
<span class="text-xs font-medium text-slate-300 tracking-wide">
                    Current Mercury Status: <span class="text-white font-bold">Direct ✓</span>
</span>
</div>
</div>
</footer>
</body></html>
