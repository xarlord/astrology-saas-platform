<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AstroVerse Mobile Sign Up</title>
<!-- Google Fonts: Space Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b3de1",
                        "secondary": "#a396c5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0B0D17",
                        "surface-glass": "rgba(22, 18, 33, 0.6)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "1.5rem", 
                        "xl": "2rem", 
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'cosmic-gradient': 'radial-gradient(circle at 50% 0%, #2a1f45 0%, #0B0D17 70%)',
                    }
                },
            },
        }
    </script>
<style>
        .glass-input {
            background: rgba(33, 27, 49, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(107, 61, 225, 0.3);
            transition: all 0.3s ease;
        }
        .glass-input:focus-within {
            border-color: #6b3de1;
            box-shadow: 0 0 15px rgba(107, 61, 225, 0.2);
            background: rgba(33, 27, 49, 0.6);
        }
        .nebula-glow {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(107, 61, 225, 0.25) 0%, rgba(11, 13, 23, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center overflow-x-hidden selection:bg-primary selection:text-white">
<!-- Mobile Container (Simulating 390px viewport max width for desktop view, full width on mobile) -->
<div class="relative w-full max-w-[390px] min-h-screen flex flex-col bg-cosmic-gradient shadow-2xl overflow-hidden mx-auto">
<!-- Background decorative elements -->
<div class="nebula-glow"></div>
<!-- Header Section -->
<div class="relative z-10 flex flex-col items-center pt-8 pb-4 px-6">
<!-- Logo -->
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary text-[32px] animate-pulse" style="font-variation-settings: 'FILL' 1, 'wght' 600;">spark</span>
<span class="text-2xl font-bold tracking-wide text-white">AstroVerse</span>
</div>
<!-- Progress Indicator -->
<div class="flex items-center gap-3 mb-2">
<div class="h-2.5 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(107,61,225,0.5)]"></div>
<div class="h-2.5 w-2.5 rounded-full border border-secondary/40 bg-transparent"></div>
</div>
<p class="text-secondary text-xs font-medium uppercase tracking-widest mt-2">Step 1 of 2</p>
</div>
<!-- Scrollable Content Area -->
<div class="relative z-10 flex-1 px-6 pb-8 overflow-y-auto">
<!-- Title Block -->
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-white mb-2 leading-tight">Create Your<br/>Account</h1>
<p class="text-secondary text-base font-normal">Start your cosmic journey</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-4">
<!-- Full Name -->
<div class="group relative">
<div class="glass-input flex items-center rounded-2xl h-14 px-4">
<span class="material-symbols-outlined text-secondary/70 group-focus-within:text-primary transition-colors">person</span>
<input class="bg-transparent border-none focus:ring-0 text-white placeholder-secondary/50 w-full h-full ml-2 text-base font-medium" placeholder="Full Name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="group relative">
<div class="glass-input flex items-center rounded-2xl h-14 px-4">
<span class="material-symbols-outlined text-secondary/70 group-focus-within:text-primary transition-colors">mail</span>
<input class="bg-transparent border-none focus:ring-0 text-white placeholder-secondary/50 w-full h-full ml-2 text-base font-medium" placeholder="Email Address" type="email"/>
</div>
</div>
<!-- Password -->
<div class="group relative">
<div class="glass-input flex items-center rounded-2xl h-14 px-4">
<span class="material-symbols-outlined text-secondary/70 group-focus-within:text-primary transition-colors">lock</span>
<input class="bg-transparent border-none focus:ring-0 text-white placeholder-secondary/50 w-full h-full ml-2 text-base font-medium" placeholder="Password" type="password"/>
<button class="text-secondary/50 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Password Strength Meter -->
<div class="flex gap-1.5 px-1 mt-[-8px] mb-1">
<div class="h-1 flex-1 rounded-full bg-red-500/80 shadow-[0_0_5px_rgba(239,68,68,0.5)]"></div>
<div class="h-1 flex-1 rounded-full bg-yellow-500/80"></div>
<div class="h-1 flex-1 rounded-full bg-slate-700"></div>
<div class="h-1 flex-1 rounded-full bg-slate-700"></div>
</div>
<p class="text-[10px] text-secondary/80 px-1 -mt-3 mb-1">Strength: Weak</p>
<!-- Confirm Password -->
<div class="group relative">
<div class="glass-input flex items-center rounded-2xl h-14 px-4">
<span class="material-symbols-outlined text-secondary/70 group-focus-within:text-primary transition-colors">lock_reset</span>
<input class="bg-transparent border-none focus:ring-0 text-white placeholder-secondary/50 w-full h-full ml-2 text-base font-medium" placeholder="Confirm Password" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<label class="flex items-start gap-3 mt-2 cursor-pointer group">
<div class="relative flex items-center pt-1">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded-md border border-secondary/40 bg-background-dark/50 checked:border-primary checked:bg-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-[calc(50%-2px)] text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none">check</span>
</div>
<span class="text-sm text-secondary group-hover:text-white transition-colors leading-tight pt-1">
                        I agree to the <a class="text-primary hover:text-primary/80 underline decoration-primary/30 underline-offset-2" href="#">Terms</a> &amp; <a class="text-primary hover:text-primary/80 underline decoration-primary/30 underline-offset-2" href="#">Privacy Policy</a>
</span>
</label>
<!-- Submit Button -->
<button class="mt-6 w-full h-14 rounded-full bg-gradient-to-r from-[#6b3de1] to-[#4a63e8] text-white font-bold text-lg shadow-[0_8px_20px_rgba(107,61,225,0.4)] hover:shadow-[0_8px_25px_rgba(107,61,225,0.6)] active:scale-[0.98] transition-all transform flex items-center justify-center gap-2 group" type="button">
<span>Create Account</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8 px-4">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-secondary/30 to-transparent"></div>
<span class="text-xs text-secondary/60 font-medium uppercase tracking-wider">or sign up with</span>
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-secondary/30 to-transparent"></div>
</div>
<!-- Social Buttons -->
<div class="flex items-center justify-center gap-6">
<button class="h-14 w-14 rounded-full glass-input hover:bg-white/10 flex items-center justify-center transition-all hover:scale-110 group">
<!-- Google SVG -->
<svg class="w-6 h-6" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M23.52 12.29C23.52 11.43 23.44 10.61 23.3 9.81H12V14.41H18.47C18.18 15.91 17.34 17.18 16.09 18.01V20.97H19.92C22.18 18.9 23.52 15.86 23.52 12.29Z" fill="#4285F4"></path>
<path d="M12 24C15.24 24 17.96 22.92 19.93 21.1L16.09 18.11C15.01 18.84 13.63 19.26 12 19.26C8.87 19.26 6.22 17.15 5.27 14.3H1.32V17.37C3.26 21.22 7.3 24 12 24Z" fill="#34A853"></path>
<path d="M5.27 14.29C5.03 13.56 4.9 12.79 4.9 11.99C4.9 11.19 5.03 10.42 5.27 9.69V6.62H1.32C0.47 8.31 0 10.11 0 12C0 13.89 0.48 15.69 1.32 17.38L5.27 14.29Z" fill="#FBBC05"></path>
<path d="M12 4.75C13.77 4.75 15.35 5.36 16.6 6.55L20.02 3.13C17.95 1.2 15.24 0 12 0C7.3 0 3.26 2.78 1.32 6.62L5.27 9.69C6.22 6.84 8.87 4.75 12 4.75Z" fill="#EA4335"></path>
</svg>
</button>
<button class="h-14 w-14 rounded-full glass-input hover:bg-white/10 flex items-center justify-center transition-all hover:scale-110">
<!-- Apple SVG -->
<svg class="w-6 h-6 text-white fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24.02-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74 1.18 0 2.45-1.02 3.67-.86 1.54.12 2.7.77 3.48 1.94-3.3 1.99-2.76 6.2.66 7.72-.56 1.45-1.29 2.5-2.89 3.43zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>
</button>
</div>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="text-secondary text-sm">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:text-white transition-colors ml-1" href="#">Sign in</a>
</p>
</div>
</div>
</div>
</body></html>
