<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AstroVerse Mobile 404</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b3de1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0B0D17", // Custom Deep Navy
                        "accent-glow": "#8b5cf6",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'cosmic-gradient': 'radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0B0D17 70%)',
                    }
                },
            },
        }
    </script>
<style>
        .star-pattern {
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
        }
        
        .nebula-glow {
            background: radial-gradient(circle at 50% 40%, rgba(107, 61, 225, 0.25), transparent 70%);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(107, 61, 225, 0.6), 0 0 10px rgba(139, 92, 246, 0.4);
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-900 dark:text-slate-100 selection:bg-primary selection:text-white">
<!-- Background Elements -->
<div class="absolute inset-0 bg-cosmic-gradient opacity-100 z-0 pointer-events-none"></div>
<div class="absolute inset-0 star-pattern opacity-50 z-0 pointer-events-none"></div>
<div class="absolute inset-0 nebula-glow z-0 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[390px] px-6 py-8 flex flex-col h-screen max-h-[844px] justify-between">
<!-- Top Spacer for vertical balance -->
<div class="flex-none h-4"></div>
<!-- Illustration & Typography Section -->
<div class="flex-1 flex flex-col items-center justify-center text-center space-y-6">
<!-- Illustration Area -->
<div class="relative w-full aspect-square max-w-[280px] mx-auto mb-2 flex items-center justify-center">
<!-- Abstract glowing ring behind -->
<div class="absolute inset-0 rounded-full border border-primary/20 scale-110 animate-pulse"></div>
<div class="absolute inset-4 rounded-full border border-primary/10 rotate-45"></div>
<!-- Main Image -->
<div class="w-full h-full bg-center bg-contain bg-no-repeat relative z-10" data-alt="Illustration of a lonely astronaut floating in deep space above a fragmented glowing zodiac wheel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCRs-aOSt1pVLdbFnUBpdL6Aa9S6jSmxrARBEpBlYLmmTCb3Hz8WVCIBKf9g7mblQQ0ENR8kxNpS9LVzZR6qLYD61arfc-HOMIIAkT8opPrjkqo94b4yBbK9vtgXjz9gTZ9foYa2RHybNhaRGEGxYaCZV9nRVw-6wk8lLJLXODRoJxovAKBCiVe3DKvc170coOOTdNyvqOSkFrQlcff9snHk-im55Tv-syPIytDO-Qsd8TXXf1Yv4RBEsDLmeQjNzksW2c3UdoRNoMs');"></div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h1 class="text-[80px] font-bold leading-none tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-primary/50 text-glow">
                    404
                </h1>
<h2 class="text-2xl font-bold tracking-tight text-white">
                    Lost in the Cosmos
                </h2>
<p class="text-slate-400 text-base font-normal leading-relaxed max-w-[300px] mx-auto">
                    The stars couldn't find the page you're looking for. Perhaps Mercury is in retrograde?
                </p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-4 pt-8 pb-4">
<!-- Primary Button -->
<button class="w-full group relative overflow-hidden rounded-full bg-gradient-to-r from-primary to-[#8b5cf6] p-[1px] shadow-[0_0_20px_rgba(107,61,225,0.4)] transition-transform active:scale-95">
<span class="relative flex items-center justify-center gap-2 rounded-full bg-[#161220]/20 backdrop-blur-sm px-6 py-4 text-base font-bold text-white transition-all group-hover:bg-opacity-0">
<span class="material-symbols-outlined text-[20px]">rocket_launch</span>
                    Return Home
                </span>
</button>
<!-- Secondary Button (Glassmorphism) -->
<button class="w-full flex items-center justify-center gap-2 rounded-full glass-panel px-6 py-4 text-base font-bold text-white/90 transition-all hover:bg-white/10 active:scale-95">
<span class="material-symbols-outlined text-[20px]">dashboard</span>
                Go to Dashboard
            </button>
</div>
<!-- Footer Note -->
<div class="flex-none flex justify-center py-4">
<div class="glass-panel rounded-full px-4 py-1.5 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
<span class="text-xs font-medium text-slate-300 tracking-wide uppercase">Mercury Status: Direct</span>
<span class="material-symbols-outlined text-primary text-[14px]">stars</span>
</div>
</div>
</main>
</body></html>
