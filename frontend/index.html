<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AstroVerse — AI-powered natal charts, personality analysis, transit forecasts, and synastry reports" />
    <meta name="theme-color" content="#0B0D17" />
    <meta name="color-scheme" content="dark" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.stripe.com" />

    <!-- Fonts: display=swap ensures text visible before font loads -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />

    <!-- Fallback: force re-render icons once font loads (fixes mobile Safari/Chrome) -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        function refreshIcons() {
          var icons = document.querySelectorAll('.material-symbols-outlined');
          if (icons.length === 0) return;
          // Force browser to re-render with loaded font
          icons.forEach(function(el) {
            el.style.display = 'none';
            el.offsetHeight; // trigger reflow
            el.style.display = '';
          });
        }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function() {
            // Check if Material Symbols loaded
            var loaded = false;
            document.fonts.forEach(function(f) {
              if (f.family === 'Material Symbols Outlined' && f.status === 'loaded') loaded = true;
            });
            if (loaded) refreshIcons();
          });
        }
      });
    </script>

    <!-- PWA icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#6b3de1" />

    <title>AstroVerse — AI-Powered Astrology</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
