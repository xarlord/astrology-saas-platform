name: Visual Regression Tests

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/visual-tests.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/visual-tests.yml'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline snapshots'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build application
        run: npm run build
        working-directory: frontend

      - name: Check for missing baseline snapshots
        id: check_snapshots
        run: |
          # Check if any snapshot directories are empty or missing
          MISSING=false
          for dir in tests/visual/*-snapshots; do
            if [ ! -d "$dir" ] || [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "Missing or empty snapshot dir: $dir"
              MISSING=true
            fi
          done
          # Also check if visual.spec.ts has any snapshots at all
          if [ ! -d "tests/visual/visual.spec.ts-snapshots" ]; then
            echo "visual.spec.ts has no snapshot directory"
            MISSING=true
          fi
          echo "missing_baselines=$MISSING" >> "$GITHUB_OUTPUT"
        working-directory: frontend

      - name: Run visual regression tests
        run: |
          UPDATE_FLAG=""
          if [ "${{ inputs.update_snapshots }}" = "true" ] || [ "${{ steps.check_snapshots.outputs.missing_baselines }}" = "true" ]; then
            echo "::notice::Generating missing baseline snapshots"
            UPDATE_FLAG="--update-snapshots"
          fi
          npx playwright test --config=tests/visual/playwright.visual.config.ts $UPDATE_FLAG
        working-directory: frontend
        env:
          CI: true

      - name: Upload visual test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-report
          path: frontend/tests/visual/visual-report/
          retention-days: 30

      - name: Upload snapshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot-diffs
          path: frontend/test-results/
          retention-days: 30

      - name: Upload baseline snapshots
        uses: actions/upload-artifact@v4
        if: always() && inputs.update_snapshots == 'true'
        with:
          name: updated-snapshots
          path: frontend/tests/visual/**-snapshots/
          retention-days: 30

      - name: Commit baseline snapshots
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.update_snapshots == 'true') ||
          steps.check_snapshots.outputs.missing_baselines == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Looking for updated snapshots..."
          find frontend/tests/visual -name "*-snapshots" -type d -exec sh -c 'ls -la "{}"' \;
          git add "frontend/tests/visual/"
          if git diff --cached --quiet; then
            echo "No new snapshots to commit"
          else
            git commit -m "chore: update visual regression baseline snapshots [skip ci]"
            git push
          fi

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && failure()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Visual Regression Test Results

              Some visual tests detected differences from baseline snapshots.

              Please review the uploaded artifacts:
              - **visual-test-report**: HTML report with detailed results
              - **snapshot-diffs**: Images showing the differences

              To update baselines (if changes are intentional):
              1. Download the updated snapshots artifact
              2. Extract to \`frontend/tests/visual/**-snapshots/\`
              3. Commit the changes

              Or trigger this workflow with "Update baseline snapshots" enabled.`
            })
