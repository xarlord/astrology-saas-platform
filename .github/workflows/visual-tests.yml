name: Visual Regression Tests

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/visual-tests.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/visual-tests.yml'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline snapshots'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build application
        run: npm run build
        working-directory: frontend

      - name: Run visual regression tests
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            npx playwright test --config=tests/visual/playwright.visual.config.ts --update-snapshots
          else
            npx playwright test --config=tests/visual/playwright.visual.config.ts
          fi
        working-directory: frontend
        env:
          CI: true

      - name: Upload visual test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-report
          path: frontend/tests/visual/visual-report/
          retention-days: 30

      - name: Upload snapshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot-diffs
          path: frontend/test-results/
          retention-days: 30

      - name: Upload baseline snapshots
        uses: actions/upload-artifact@v4
        if: inputs.update_snapshots == 'true'
        with:
          name: updated-snapshots
          path: frontend/tests/visual/**-snapshots/
          retention-days: 30

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && failure()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Visual Regression Test Results

              Some visual tests detected differences from baseline snapshots.

              Please review the uploaded artifacts:
              - **visual-test-report**: HTML report with detailed results
              - **snapshot-diffs**: Images showing the differences

              To update baselines (if changes are intentional):
              1. Download the updated snapshots artifact
              2. Extract to \`frontend/tests/visual/**-snapshots/\`
              3. Commit the changes

              Or trigger this workflow with "Update baseline snapshots" enabled.`
            })
