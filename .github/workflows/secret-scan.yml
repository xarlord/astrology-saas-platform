name: Secret Scan

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan current tree for newly introduced secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --redact --no-git --config=.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}