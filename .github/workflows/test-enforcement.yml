name: Test Enforcement Gate

on:
  pull_request:
    branches: [master, main, develop]

jobs:
  test-presence-check:
    name: "🧪 Tests Required for Changes"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check test presence for changed files
        run: |
          python scripts/test-enforcement/check-test-presence.py \
            --base ${{ github.base_ref }} \
            --project astroverse \
            --verbose

  coverage-gate:
    name: "📊 Coverage Must Not Decrease"
    runs-on: ubuntu-latest
    needs: []  # Runs in parallel with other CI jobs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Backend coverage ──
      - name: Run backend tests with coverage
        run: cd backend && npm run test:unit -- --coverage --coverageReporters json-summary text

      # ── Frontend coverage ──
      - name: Run frontend tests with coverage
        run: cd frontend && npx vitest run --coverage

      - name: Check coverage meets minimums
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check backend coverage
          if [ -f backend/coverage/coverage-summary.json ]; then
            echo "### Backend" >> $GITHUB_STEP_SUMMARY
            python scripts/test-enforcement/coverage-diff-check.py \
              --coverage-file backend/coverage/coverage-summary.json \
              --format jest \
              --min-coverage 70 || true
          fi

          # Check frontend coverage
          if [ -f frontend/coverage/coverage-summary.json ]; then
            echo "### Frontend" >> $GITHUB_STEP_SUMMARY
            python scripts/test-enforcement/coverage-diff-check.py \
              --coverage-file frontend/coverage/coverage-summary.json \
              --format jest \
              --min-coverage 60 || true
          fi
