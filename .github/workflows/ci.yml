name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: cd backend && npm run lint

      - name: Run type check
        continue-on-error: true
        run: cd backend && npx tsc --noEmit

      - name: Run unit tests
        continue-on-error: true
        run: cd backend && npm run test:unit -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: cd frontend && npm run lint

      - name: Run type check
        continue-on-error: true
        run: cd frontend && npx tsc --noEmit

      - name: Run unit tests
        run: cd frontend && npm run test:run -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend

  # Live Tests (requires running server + database)
  live-tests:
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astrology_saas
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5434
      DB_NAME: astrology_saas
      DB_USER: postgres
      DB_PASSWORD: postgres
      RATE_LIMIT_MAX_REQUESTS: 10000
      JWT_SECRET: test-jwt-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx knex migrate:latest

      - name: Start backend server
        run: npx tsx src/server.ts &

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:3001/health --timeout 30000

      - name: Run live tests
        run: npm run test:live

      - name: Upload live test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-test-results
          path: backend/test-results/
          retention-days: 30

  # E2E Tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [live-tests, frontend-test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build frontend
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          RATE_LIMIT_MAX_REQUESTS: 10000

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: frontend/playwright-report/
          retention-days: 30

  # Visual Regression Tests
  visual-tests:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run visual regression tests
        run: npx playwright test --config=tests/visual/playwright.visual.config.ts
        env:
          CI: true

      - name: Upload visual test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-report
          path: frontend/tests/visual/visual-report/
          retention-days: 30

      - name: Upload snapshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot-diffs
          path: frontend/test-results/
          retention-days: 30

  # BDD Tests (Cucumber/Gherkin)
  bdd-tests:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astrology_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run BDD tests (Gherkin/Cucumber)
        run: npx cucumber-js
        env:
          CI: true
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_TEST_NAME: astrology_test

      - name: Run Playwright-native BDD tests
        run: npx playwright test --config=tests/bdd/playwright.bdd.config.ts
        env:
          CI: true

      - name: Upload BDD test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-test-reports
          path: |
            frontend/reports/bdd/
          retention-days: 30

  # Accessibility Tests (WCAG 2.1 AA)
  accessibility-tests:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run accessibility tests
        run: npx playwright test --config=tests/accessibility/playwright.accessibility.config.ts
        env:
          CI: true

      - name: Upload accessibility reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-reports
          path: frontend/reports/accessibility/
          retention-days: 30

  # Integration Tests (Real Database)
  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astrology_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Setup test database
        run: |
          cd ../backend
          npm run db:migrate:test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_TEST_NAME: astrology_test

      - name: Build all packages
        run: |
          cd ..
          npm run build --workspaces

      - name: Run integration tests
        run: npx playwright test --grep @integration
        env:
          CI: true
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_TEST_NAME: astrology_test
          REDIS_URL: redis://localhost:6379

      - name: Upload integration test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: frontend/playwright-report/
          retention-days: 30

  # Build and Deploy
  build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, live-tests, e2e-tests, visual-tests, bdd-tests, accessibility-tests, integration-tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      - name: Create deployment artifact
        run: |
          mkdir -p deploy/backend deploy/frontend
          cp -r backend/dist deploy/backend/
          cp -r backend/node_modules deploy/backend/
          cp -r backend/package*.json deploy/backend/
          cp -r frontend/dist deploy/frontend/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment
          path: deploy/
          retention-days: 7
